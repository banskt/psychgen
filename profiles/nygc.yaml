executor: slurm
jobs: 50
latency-wait: 60
keep-going: true
rerun-incomplete: true
printshellcmds: true
# scheduler: greedy
default-resources:
  - slurm_account=dklab
  - slurm_partition=cpu
  - nodes=1
  - tasks=1
  - cpus_per_task=1 # no. of cores on the same node
  - mem_mb=8000
  - runtime=3600 # 1hr (see bug below)
  # Bug causes this to be read in seconds.
  # https://github.com/snakemake/snakemake/issues/4039
  # e.g:
  # - runtime=10080
  # expected behavior: 7 days, but job ends in 2h 48m.
  # workaround: specify runtime=7d
