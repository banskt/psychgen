# =============================================================================
# Analysis parameters for the cross-validation pipeline.
# =============================================================================
 
cross_validation:
 
  # Clorinn model and solver
  model: "nnm"
  solver: "pgd-fw"
 
  # Clorinn model/solver parameters
  max_iter: 2000
  pgd_max_iter: 20
  svd_max_iter: 100        # null -> let Clorinn choose automatically
  svd_method: "left-gram"
  dg_tol: 10 # tolerance for duality gap

  # Coarse nuclear-norm grid (powers of 2)
  nucnorm_coarse:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
    - 128
    - 256
    - 512
    - 1024
    - 2048
    - 4096
    - 8192
    - 16384
    - 32768
 
  # Number of interior points in the fine geometric grid
  # (placed strictly between the two coarse neighbours that bracket the optimum)
  n_fine_points: 6

  sparse_scale: 1.0 # not a grid yet


  # ====================================
  # CV with matrix completion
  # ====================================
  matrix_completion:
    enabled: True
    # Held-out fraction and random seed for mask generation (create_cv_input)
    holdout_fraction: 0.1
    mask_seed: 42


  # ====================================
  # CV with split replication
  # ====================================
  split_replication:
    enabled: True
    # how many independent replications of the splitting
    n_repeats: 5
    # how many parts each split divides the SNPs into
    n_folds: 2 # 2 = half-split; generalises to 3, 4, etc.
    split_seed: 43

    # Number of left singular vectors used to define the trait subspace U_k.
    n_factors: 40
    k_pivot: 20   # k at which fine grid search is anchored

    selection:
      # Choose the smallest nucnorm whose mean projector distance is within
      # (best mean + one_se_multiplier * best SE + tolerances).
      one_se_multiplier: 1.0
      abs_tolerance: 0.0
      rel_tolerance: 0.0
